<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-label="GNN LLM synergy diagram">
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f8fa"/>
      <stop offset="1" stop-color="#eef3f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0c1d2e" flood-opacity=".15"/></filter>
    <style>
      .label{font-family:Inter,Arial,sans-serif;font-size:28px;font-weight:800;fill:#102339}
      .sub{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#5c7080}
      .line{stroke:#7ca8b2;stroke-width:4;stroke-linecap:round;stroke-opacity:.65;fill:none}
      .arrow{stroke:#b7934f;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .nodeA{fill:#b7934f}.nodeB{fill:#5ca9bb}.nodeC{fill:#102339}
      .chip{stroke:#102339;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:.58}
      .softStroke{stroke:#d8e3e7;stroke-width:2;fill:none}
    </style>
  </defs>
  <rect x="15" y="20" width="950" height="520" rx="38" fill="#f6f6f7" stroke="#d6e1e6" stroke-width="2"/>
  <rect x="30" y="40" width="920" height="480" rx="34" fill="url(#panel)"/>
  <g opacity=".46">
