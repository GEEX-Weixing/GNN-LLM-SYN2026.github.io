  <g filter="url(#shadow)">
    <rect x="584" y="110" width="300" height="300" rx="28" fill="#fbfbfc"/>
    <text x="630" y="170" class="label">LLM</text>
    <text x="630" y="198" class="sub">semantic modeling and generation</text>
    <g transform="translate(628,235)">
