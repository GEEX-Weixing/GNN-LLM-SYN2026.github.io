    <text x="48" y="72" class="text">LLM</text>
    <text x="48" y="110" class="small">semantic modeling &amp; generation</text>
    <rect x="48" y="148" width="414" height="18" rx="9" fill="#e5eef2" opacity=".24"/>
    <rect x="48" y="190" width="474" height="18" rx="9" fill="#e5eef2" opacity=".18"/>
    <rect x="48" y="232" width="360" height="18" rx="9" fill="#e5eef2" opacity=".15"/>
    <circle cx="456" cy="84" r="38" fill="#71c7d6" opacity=".28"/>
    <path d="M435 84h42M456 63v42" stroke="#dfe9ef" stroke-width="4" stroke-opacity=".75"/>
    <g opacity=".35">
      <circle cx="490" cy="236" r="24" fill="#74c1d1"/>
      <path d="M479 236h22M490 225v22" stroke="#0d2337" stroke-width="3" stroke-linecap="round"/>
      <circle cx="432" cy="286" r="22" fill="#d3ae63" opacity=".8"/>
      <path d="M422 279h20v14h-20zM446 279h5M446 286h5M446 293h5" stroke="#0d2337" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <g transform="translate(300,194)" filter="url(#softShadow)">
    <rect x="0" y="0" width="540" height="360" rx="32" fill="#0d1f34" opacity=".24" stroke="#c7d7de" stroke-opacity=".18"/>
    <g transform="translate(60,18)">
      <circle cx="120" cy="90" r="10" class="node"/>
      <circle cx="260" cy="60" r="12" class="node2"/>
      <circle cx="365" cy="150" r="10" class="node"/>
      <circle cx="210" cy="205" r="13" class="node2"/>
      <circle cx="90" cy="260" r="11" class="node2"/>
      <circle cx="330" cy="300" r="12" class="node"/>
      <circle cx="455" cy="260" r="10" class="node2"/>
      <path class="line" d="M120 90L260 60L365 150L210 205L120 90M210 205L90 260L330 300L455 260L365 150M260 60L210 205M330 300L365 150"/>
      <path class="thin" d="M70 345C180 390 330 390 480 330"/>
      <text x="72" y="30" class="text">GNN</text>
      <text x="72" y="62" class="small">structural knowledge</text>
    </g>
  </g>

  <g opacity=".62">
    <path class="line" d="M842 390C954 285 1026 304 1084 362"/>
    <path class="line" d="M852 478C972 560 1045 534 1112 462"/>
    <path d="M1024 323l60 39-69 15" fill="none" stroke="#d9b56c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".72"/>
    <path d="M905 538l-54-60 76-5" fill="none" stroke="#71c7d6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".72"/>
    <rect x="850" y="392" width="210" height="74" rx="37" fill="#0d2237" opacity=".95"/>
    <text x="905" y="438" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" fill="#ffffff">Synergy</text>
  </g>

  <g transform="translate(0,710)">
    <path class="sky" d="M0 370V220h95v-60h76v92h76V112h112v140h62v-54h80v54h76v-92h134v92h80v-58h86v58h90v-82h110v82h66v-140h24v140h86v-68h84v68h88V82h36v170h94v-86h80v86h86v-132h20v132h76v-96h88v96h106V126h118v126h72v-70h96v258z"/>
    <path d="M0 370H1920" stroke="#d9b56c" stroke-width="3" stroke-opacity=".28"/>

    <!-- Shenyang-inspired landmark accents -->
    <g opacity=".30">
      <path d="M240 252h120l-14 18H254z" fill="#d3ae63"/>
      <path d="M256 270h88v96h-88z" fill="#0b1626"/>
      <path d="M266 290h68M266 316h68M266 342h68" stroke="#6aaebc" stroke-width="4" stroke-opacity=".35"/>

      <path d="M1430 366V170" stroke="#d3ae63" stroke-width="6" stroke-opacity=".48"/>
      <circle cx="1430" cy="152" r="18" fill="#d3ae63" fill-opacity=".45"/>
      <circle cx="1430" cy="152" r="36" fill="none" stroke="#6aaebc" stroke-width="3" stroke-opacity=".24"/>
      <path d="M1410 366h40" stroke="#d3ae63" stroke-width="5" stroke-opacity=".32"/>

      <path d="M1060 230c30-34 62-34 96 0v136h-96z" fill="#0b1626"/>
      <path d="M1046 236h124l-14 16h-96z" fill="#d3ae63" fill-opacity=".55"/>
      <path d="M1080 268h56M1080 296h56M1080 324h56" stroke="#6aaebc" stroke-width="4" stroke-opacity=".32"/>
    </g>

    <path d="M1212 142c54 26 92 70 112 132M1250 104c88 42 150 110 184 204" fill="none" stroke="#d9b56c" stroke-width="5" stroke-opacity=".20" stroke-linecap="round"/>
  </g>
</svg>
