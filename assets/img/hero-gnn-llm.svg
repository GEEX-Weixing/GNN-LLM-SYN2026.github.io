<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Abstract GNN LLM synergy background with Shenyang skyline">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081426"/>
      <stop offset="42%" stop-color="#0f2741"/>
      <stop offset="100%" stop-color="#1d2134"/>
    </linearGradient>
    <radialGradient id="glow1" cx="72%" cy="24%" r="44%">
      <stop offset="0%" stop-color="#7cc6d7" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#7cc6d7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="18%" cy="18%" r="38%">
      <stop offset="0%" stop-color="#d3ae63" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#d3ae63" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cityGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#d3ae63" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#d3ae63" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .line{stroke:#8ab8c9;stroke-width:3;stroke-opacity:.34;fill:none}
      .thin{stroke:#ffffff;stroke-width:1.4;stroke-opacity:.12;fill:none}
      .node{fill:#d9b56c;stroke:#ffffff;stroke-opacity:.7;stroke-width:2}
      .node2{fill:#71c7d6;stroke:#ffffff;stroke-opacity:.65;stroke-width:2}
      .text{fill:#dfe9ef;font-family:Inter,Arial,sans-serif;font-size:34px;font-weight:700;letter-spacing:2px;opacity:.72}
      .small{fill:#cbd8df;font-family:Inter,Arial,sans-serif;font-size:18px;opacity:.55}
      .sky{fill:#07101c;opacity:.68}
      .grid{stroke:#ffffff;stroke-width:1;stroke-opacity:.075}
      .iconStroke{stroke:#dfe9ef;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:.62}
      .iconFill{fill:#7dc6d6;fill-opacity:.18;stroke:#a7d9e2;stroke-opacity:.28}
    </style>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#cityGlow)"/>
  <g opacity="0.45">
    <path class="grid" d="M0 140H1920M0 280H1920M0 420H1920M0 560H1920M0 700H1920M0 840H1920M0 980H1920"/>
    <path class="grid" d="M120 0V1080M300 0V1080M480 0V1080M660 0V1080M840 0V1080M1020 0V1080M1200 0V1080M1380 0V1080M1560 0V1080M1740 0V1080"/>
  </g>

  <g opacity=".26">
    <circle cx="1550" cy="192" r="52" class="iconFill"/>
    <path class="iconStroke" d="M1528 192h44M1550 170v44"/>
    <circle cx="1640" cy="314" r="38" class="iconFill"/>
    <path class="iconStroke" d="M1621 303h38v22h-22l-12 12v-12h-4z"/>
    <circle cx="1302" cy="150" r="34" class="iconFill"/>
    <path class="iconStroke" d="M1288 141h28v18h-28zM1324 141h8M1324 150h8M1324 159h8"/>
